<!DOCTYPE html>
<html lang="en">
<head>

    <title>FCM Test</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        .popup {
            position: fixed;
            top: 20px;
            right: 20px;

            width: 320px;

            background: #ffffff;

            border-radius: 10px;

            padding: 15px;

            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);

            display: none;

            z-index: 9999;

            animation: slideIn 0.3s ease;
        }

        .popup h3 {
            margin: 0 0 8px 0;
        }

        .popup p {
            margin: 0;
        }

        .popup.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

        <p id="popup-body"></p>
    </div>

        // Foreground Notification Listener
        onMessage(
            messaging,
            (payload) => {

                console.log(
                    "🔔 Foreground Notification Received"
                );

                console.log(payload);

                const title =
                    payload.notification?.title ||
                    "Notification";

                const body =
                    payload.notification?.body ||
                    "";

                // Browser Notification
                new Notification(
                    title,
                    {
                        body: body
                    }
                );

                // In-page Popup
                showPopup(
                    title,
                    body
                );
            }
        );

        function showPopup(
            title,
            body
        ) {

            const popup =
                document.getElementById(
                    "notification-popup"
                );

            document.getElementById(
                "popup-title"
            ).innerText = title;

            document.getElementById(
                "popup-body"
            ).innerText = body;

            popup.classList.add(
                "show"
            );

            setTimeout(
                () => {

                    popup.classList.remove(
                        "show"
                    );

                },
                50000
            );
        }
