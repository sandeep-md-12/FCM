<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCM Test</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        .popup {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            background: #ffffff;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
            display: none;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        .popup h3 {
            margin: 0 0 8px 0;
        }

        .popup p {
            margin: 0 0 8px 0;
        }

        .popup a {
            color: #007bff;
            text-decoration: underline;
            cursor: pointer;
        }

        .popup.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

    <h2>Firebase Cloud Messaging Test</h2>

    <p>Open Developer Tools (F12) → Console</p>

    <div id="notification-popup" class="popup">
        <h3 id="popup-title"></h3>
        <p id="popup-body"></p>
        <a id="popup-link" target="_blank" rel="noopener noreferrer"></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getMessaging, getToken, onMessage, isSupported } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "API KEY HERE ",
            authDomain: "DOMAIN HERE ",
            projectId: "PROJECT ID HERE ",
            storageBucket: "STORAGE BUCKET HERE ",
            messagingSenderId: "MESSAGER ID ",
            appId: "1:APP ID 73",
            measurementId: "G-MEASURE ID "
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        // Register Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker
                .register("/firebase-messaging-sw.js")
                .then((registration) => {
                    console.log("✅ Service Worker Registered", registration);
                })
                .catch((error) => {
                    console.error("❌ Service Worker Registration Failed", error);
                });
        }

        // Request Notification Permission and Init
        Notification.requestPermission()
            .then(async (permission) => {
                if (permission !== "granted") {
                    console.log("❌ Notification Permission Denied");
                    return;
                }
                await initializePushNotifications();
            })
            .catch((error) => {
                console.error("❌ Token Error", error);
            });

        const initializePushNotifications = async () => {
            const supported = await isSupported();
            if (!supported) {
                console.log("This browser profile or engine doesn't support Web Push APIs.");
                return;
            }

            try {
                const token = await getToken(messaging, { 
                    vapidKey: "BB82dh1eQrcTB7YfsH6sNjyFdpT37xTEQB6guTCVZjyZozot-Sv8bx0ZV7VXWq9GbdVPBq2thbnxHXenLXq2FvU" 
                });

                if (token) {
                    console.log("✅ Success! FCM Token generated:", token);
                } else {
                    console.log("No token received. Ensure notification permissions are granted.");
                }
            } catch (error) {
                console.error("FCM Token generation failed:", error);
            }
        };

        // Foreground Notification Listener
        onMessage(messaging, (payload) => {
            console.log("🔔 Foreground Notification Received", payload);

            const title = payload.notification?.title || "Notification";
            const body = payload.notification?.body || "";
            
            // FIX 1: Custom payload items are fetched from payload.data directly
            const link = payload.data?.link || ""; 

            // FIX 2: Fixed native browser notification click behavior
            const notification = new Notification(title, { body: body });
            if (link) {
                notification.onclick = (e) => {
                    e.preventDefault();
                    // window.open(link, '_self');
                    // window.open(link, '_blank');
                    window.location.href = link;
                };
            }

            // In-page Popup
            showPopup(title, body, link);
        });

        // function showPopup(title, body, link) {
        //     const popup = document.getElementById("notification-popup");
        //     const linkElement = document.getElementById("popup-link");

        //     document.getElementById("popup-title").innerText = title;
        //     document.getElementById("popup-body").innerText = body;

        //     // FIX 3: Correctly configure the link as a clickable HTML element
        //     if (link) {
        //         linkElement.href = link;
        //         linkElement.innerText = " Link";
        //         linkElement.style.display = "inline-block";
        //     } else {
        //         linkElement.style.display = "none";
        //     }

        //     popup.classList.add("show");

        //     setTimeout(() => {
        //         popup.classList.remove("show");
        //     }, 50000);
        // }
    function showPopup(title, body, link) {
    const popup = document.getElementById("notification-popup");
    const linkElement = document.getElementById("popup-link");

    document.getElementById("popup-title").innerText = title;
    document.getElementById("popup-body").innerText = body;

    if (link) {
        linkElement.href = link;
        // Enforce staying in the same frame/tab context
        linkElement.removeAttribute("target"); 
        
        linkElement.innerText = "View Details";
        linkElement.style.display = "inline-block";
    } else {
        linkElement.style.display = "none";
    }

    popup.classList.add("show");

    setTimeout(() => {
        popup.classList.remove("show");
    }, 50000);
}
    </script>
</body>
</html>
